# ============================================================
# CD Pipeline - Build, Push to ACR, Deploy to Azure Container Apps
# Triggered on push to main (after CI passes)
# ============================================================
name: CD - Deploy to Azure

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false # Don't cancel in-flight deploys

env:
  ACR_NAME: splititacr
  ACR_LOGIN_SERVER: splititacr.azurecr.io
  RESOURCE_GROUP: splitit-rg

jobs:
  # -----------------------------------------------------------
  # 1. Build & Test first
  # -----------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build & test all modules
        run: mvn clean verify -B

  # -----------------------------------------------------------
  # 2. Build Docker images & push to ACR (parallel matrix)
  # -----------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: true
      matrix:
        service:
          - discovery-server
          - api-gateway
          - user-service
          - group-service
          - expense-service
          - settlement-service
          - notification-service
          - payment-service
          - analytics-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}

  # -----------------------------------------------------------
  # 3. Deploy to Azure Container Apps (sequential, ordered)
  # -----------------------------------------------------------
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy discovery-server first (other services depend on it)
      - name: Deploy discovery-server
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name discovery-server \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/discovery-server:${{ github.sha }} \
              --min-replicas 0 --max-replicas 1
            echo "Waiting 30s for discovery-server to stabilize..."
            sleep 30

      # Deploy api-gateway with direct service URLs (bypass Eureka for routing)
      - name: Deploy api-gateway
        uses: azure/cli@v2
        env:
          BASE_DOMAIN: delightfulfield-e71e7e6d.eastus.azurecontainerapps.io
        with:
          inlineScript: |
            az containerapp update \
              --name api-gateway \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/api-gateway:${{ github.sha }} \
              --min-replicas 0 --max-replicas 1 \
              --set-env-vars \
                "SERVICES_USER_URL=https://user-service.${{ env.BASE_DOMAIN }}" \
                "SERVICES_GROUP_URL=https://group-service.${{ env.BASE_DOMAIN }}" \
                "SERVICES_EXPENSE_URL=https://expense-service.${{ env.BASE_DOMAIN }}" \
                "SERVICES_SETTLEMENT_URL=https://settlement-service.${{ env.BASE_DOMAIN }}" \
                "SERVICES_PAYMENT_URL=https://payment-service.${{ env.BASE_DOMAIN }}" \
                "SERVICES_ANALYTICS_URL=https://analytics-service.${{ env.BASE_DOMAIN }}" \
                "SERVICES_NOTIFICATION_URL=https://notification-service.${{ env.BASE_DOMAIN }}"

      # Deploy all backend services in parallel (scale-to-zero to reduce idle costs)
      - name: Deploy backend services
        uses: azure/cli@v2
        with:
          inlineScript: |
            for svc in user-service group-service expense-service settlement-service notification-service payment-service analytics-service; do
              echo "Deploying $svc..."
              az containerapp update \
                --name $svc \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --image ${{ env.ACR_LOGIN_SERVER }}/${svc}:${{ github.sha }} \
                --min-replicas 0 --max-replicas 2 &
            done
            echo "Waiting for all deployments to complete..."
            wait
            echo "All services deployed!"

      - name: Logout from Azure
        if: always()
        uses: azure/cli@v2
        with:
          inlineScript: az logout

  # -----------------------------------------------------------
  # 4. Smoke test after deploy
  # -----------------------------------------------------------
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    environment: production

    env:
      GATEWAY_URL: https://api-gateway.delightfulfield-e71e7e6d.eastus.azurecontainerapps.io

    steps:
      - name: Wait for services to stabilize
        run: sleep 45

      - name: Health check - API Gateway
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.GATEWAY_URL }}/actuator/health || echo "000")
            echo "Attempt $i - API Gateway health: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            [ "$i" -lt 3 ] && sleep 15
          done
          echo "::error::API Gateway health check failed after 3 attempts (last status: $STATUS)"
          exit 1

      - name: Health check - User Service (via Gateway)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.GATEWAY_URL }}/api/users/health || echo "000")
            echo "Attempt $i - User Service health: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            [ "$i" -lt 3 ] && sleep 15
          done
          echo "::error::User Service health check failed after 3 attempts (last status: $STATUS)"
          exit 1

      - name: Health check - Expense Service (via Gateway)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.GATEWAY_URL }}/api/expenses/health || echo "000")
            echo "Attempt $i - Expense Service health: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            [ "$i" -lt 3 ] && sleep 15
          done
          echo "::error::Expense Service health check failed after 3 attempts (last status: $STATUS)"
          exit 1

      - name: Smoke test summary
        run: echo "All smoke tests passed successfully."
